<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Room</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h1 class="logo">Music Room</h1>

            <button id="loginButton" class="btn primary">Login with Spotify</button>
            <p id="authStatus" class="auth-status"></p>

            <div class="viewer">
                👀 <span id="viewerCount">0</span> listening
            </div>
        </aside>

        <!-- Main -->
        <main class="main">

            <!-- Search -->
            <section class="search-section">
                <div class="search-bar">
                    <input id="searchInput" placeholder="What do you want to play?" />
                    <button id="searchButton">Search</button>
                </div>

                <div id="searchResults" class="grid"></div>
            </section>

            <!-- Queue -->
            <section class="queue-section">
                <h2>Queue</h2>

                <button id="playButton" class="btn green">▶ Play</button>

                <div id="nowPlaying" class="now-playing"></div>

                <div id="queueList" class="queue"></div>
            </section>

        </main>

    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="main.js"></script>
</body>

</html>
